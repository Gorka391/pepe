<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museo VR — Coches Clásicos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Cormorant Garamond', serif; }
  #canvas { display: block; }
  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #title-bar { position: absolute; top: 0; left: 0; right: 0; padding: 28px 48px; display: flex; align-items: flex-start; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); }
  #museum-name { font-family: 'Syncopate', sans-serif; font-size: 13px; letter-spacing: 6px; color: #d4a843; text-transform: uppercase; font-weight: 700; }
  #museum-sub { font-size: 13px; letter-spacing: 2px; color: rgba(212,168,67,0.5); margin-top: 4px; font-style: italic; }
  #controls-hint { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 32px; align-items: center; background: rgba(0,0,0,0.6); border: 1px solid rgba(212,168,67,0.15); padding: 12px 32px; backdrop-filter: blur(12px); color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px; font-family: 'Syncopate', sans-serif; }
  .hint-key { background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.25); padding: 3px 10px; color: #d4a843; font-size: 9px; letter-spacing: 2px; }
  #info-panel { position: absolute; right: 0; top: 50%; transform: translateY(-50%) translateX(30px); width: 360px; pointer-events: all; background: linear-gradient(135deg, rgba(4,4,8,0.95) 0%, rgba(8,8,16,0.92) 100%); border-left: 1px solid rgba(212,168,67,0.4); border-top: 1px solid rgba(212,168,67,0.15); border-bottom: 1px solid rgba(212,168,67,0.15); backdrop-filter: blur(24px); padding: 44px 40px; opacity: 0; transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1); }
  #info-panel.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
  #info-year { font-family: 'Syncopate', sans-serif; font-size: 10px; letter-spacing: 6px; color: #d4a843; text-transform: uppercase; margin-bottom: 12px; }
  #info-name { font-size: 42px; font-weight: 300; color: #fff; line-height: 1.0; margin-bottom: 4px; font-style: italic; }
  #info-brand { font-family: 'Syncopate', sans-serif; font-size: 10px; letter-spacing: 5px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 32px; }
  .info-divider { width: 48px; height: 1px; background: linear-gradient(to right, #d4a843, transparent); margin-bottom: 28px; }
  #info-desc { font-size: 15px; line-height: 1.9; color: rgba(255,255,255,0.6); margin-bottom: 32px; font-weight: 300; }
  .info-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  .spec-item { border-top: 1px solid rgba(212,168,67,0.15); padding-top: 14px; }
  .spec-label { font-family: 'Syncopate', sans-serif; font-size: 8px; letter-spacing: 3px; color: rgba(212,168,67,0.55); text-transform: uppercase; margin-bottom: 5px; }
  .spec-value { font-size: 22px; color: #fff; font-weight: 300; letter-spacing: 1px; }
  #car-nav { display: flex; gap: 10px; justify-content: center; }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(212,168,67,0.15); border: 1px solid rgba(212,168,67,0.3); cursor: pointer; transition: all 0.3s; pointer-events: all; }
  .nav-dot.active { background: #d4a843; transform: scale(1.3); }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(212,168,67,0.6); }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after { width: 100%; height: 1px; top: 50%; left: 0; }
  #crosshair-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; border-radius: 50%; background: #d4a843; transform: translate(-50%, -50%); }
  #proximity-label { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); font-family: 'Syncopate', sans-serif; font-size: 9px; letter-spacing: 5px; color: rgba(212,168,67,0.8); text-transform: uppercase; text-align: center; background: rgba(0,0,0,0.6); padding: 10px 24px; border: 1px solid rgba(212,168,67,0.2); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #proximity-label.show { opacity: 1; }
  #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 1.2s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-title { font-family: 'Syncopate', sans-serif; font-size: 32px; color: #d4a843; letter-spacing: 12px; margin-bottom: 6px; font-weight: 700; }
  .loader-sub { font-size: 16px; letter-spacing: 3px; color: rgba(212,168,67,0.45); margin-bottom: 56px; font-style: italic; }
  .loader-bar-wrap { width: 240px; height: 1px; background: rgba(212,168,67,0.15); }
  .loader-bar { height: 1px; background: #d4a843; width: 0; transition: width 2.5s ease; }
  .loader-hint { margin-top: 28px; font-family: 'Syncopate', sans-serif; font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
  #enter-btn { margin-top: 40px; padding: 16px 56px; background: transparent; border: 1px solid #d4a843; color: #d4a843; font-family: 'Syncopate', sans-serif; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; cursor: pointer; transition: all 0.4s; display: none; }
  #enter-btn:hover { background: #d4a843; color: #000; }

  /* ── VR Button ───────────────────────────────────────────── */
  #VRButton {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    padding: 14px 44px;
    background: transparent;
    border: 1px solid #d4a843;
    color: #d4a843;
    font-family: 'Syncopate', sans-serif;
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.4s, color 0.4s;
    pointer-events: all;
  }
  #VRButton:hover:not(:disabled) { background: #d4a843; color: #000; }
  #VRButton:disabled { opacity: 0.35; cursor: default; border-color: rgba(212,168,67,0.3); }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">MUSEO</div>
  <div class="loader-sub">Colección de Automóviles Históricos</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-hint" id="loader-hint">Iniciando...</div>
  <button id="enter-btn" onclick="enterMuseum()">Entrar al Museo</button>
</div>

<canvas id="canvas"></canvas>

<!-- Botón VR — oculto hasta que initVRButton() lo muestre -->
<button id="VRButton" style="display:none">Entrar en VR</button>

<div id="hud">
  <div id="title-bar">
    <div>
      <div id="museum-name">Museo Automovilístico</div>
      <div id="museum-sub">Colección Permanente · Vehículos Históricos</div>
    </div>
    <div style="font-family:'Syncopate',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(212,168,67,0.4);">EST. MMXXV</div>
  </div>
  <div id="crosshair"><div id="crosshair-dot"></div></div>
  <div id="info-panel">
    <div id="info-year"></div>
    <div id="info-name"></div>
    <div id="info-brand"></div>
    <div class="info-divider"></div>
    <div id="info-desc"></div>
    <div class="info-specs" id="info-specs"></div>
    <div id="car-nav"></div>
  </div>
  <div id="proximity-label"></div>
  <div id="controls-hint">
    <span><span class="hint-key">WASD</span> Mover</span>
    <span><span class="hint-key">RATÓN</span> Mirar</span>
    <span><span class="hint-key">CLIC</span> Inspeccionar</span>
    <span><span class="hint-key">ESC</span> Soltar</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===================== CAR DATA =====================
const CARS = [
  { id:0, name:"Model T", brand:"Ford", year:"1908", color:0x111111, accentColor:0x8B7355, chromeColor:0xcccccc, desc:"El primer automóvil producido en masa. Henry Ford democratizó el transporte con la cadena de montaje, cambiando la civilización para siempre.", specs:[{label:"Motor",value:"4 cil."},{label:"Potencia",value:"20 CV"},{label:"Vel. máx.",value:"72 km/h"},{label:"Producción",value:"15 millones"}], position:[-14,0,0], type:'modelT' },
  { id:1, name:"Type 35", brand:"Bugatti", year:"1924", color:0x0d2b6e, accentColor:0xd4a843, chromeColor:0xdddddd, desc:"El coche de carreras más victorioso de la historia. Ettore Bugatti unió velocidad y elegancia en una obra de arte mecánica que ganó más de 1000 carreras.", specs:[{label:"Motor",value:"8 cil."},{label:"Potencia",value:"128 CV"},{label:"Vel. máx.",value:"210 km/h"},{label:"Victorias",value:"+1000"}], position:[-7,0,0], type:'bugatti35' },
  { id:2, name:"Silver Ghost", brand:"Rolls-Royce", year:"1907", color:0xb8b8b8, accentColor:0xd4a843, chromeColor:0xe8e8e8, desc:"Apodado el mejor automóvil del mundo. Su silencio mecánico legendario y acabado artesanal establecieron el estándar del lujo automovilístico para siempre.", specs:[{label:"Motor",value:"6 cil."},{label:"Potencia",value:"48 CV"},{label:"Vel. máx.",value:"105 km/h"},{label:"Precio 1907",value:"£985"}], position:[0,0,0], type:'rollsGhost' },
  { id:3, name:"E-Type", brand:"Jaguar", year:"1961", color:0x8B0000, accentColor:0xcccccc, chromeColor:0xeeeeee, desc:"Enzo Ferrari lo llamó el coche más hermoso jamás construido. Símbolo del Swinging London, su silueta sigue siendo la definición de belleza automovilística.", specs:[{label:"Motor",value:"6 cil."},{label:"Potencia",value:"265 CV"},{label:"Vel. máx.",value:"241 km/h"},{label:"0-100",value:"6.9 s"}], position:[7,0,0], type:'jaguarEtype' },
  { id:4, name:"250 GTO", brand:"Ferrari", year:"1962", color:0xcc2200, accentColor:0xf5c518, chromeColor:0xdddddd, desc:"La obra maestra absoluta de Maranello. Solo 36 unidades construidas. Hoy es el automóvil más valioso del mundo, con ejemplares vendidos por más de 70 millones.", specs:[{label:"Motor",value:"V12"},{label:"Potencia",value:"302 CV"},{label:"Vel. máx.",value:"280 km/h"},{label:"Unidades",value:"36"}], position:[14,0,0], type:'ferrari250gto' }
];

// ===================== THREE SETUP =====================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

// ── [1] WEBXR: habilitar soporte VR en el renderer ───────────
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03030a);
scene.fog = new THREE.FogExp2(0x03030a, 0.028);
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.65, 10);

// ===================== LIGHTING =====================
function setupLighting() {
  scene.add(new THREE.AmbientLight(0x0a0a1a, 0.6));
  scene.add(new THREE.HemisphereLight(0x1a1a2e, 0x0a0510, 0.4));
  CARS.forEach(car => {
    const spot = new THREE.SpotLight(0xfff0d8, 3.5, 22, 0.28, 0.5, 1.5);
    spot.position.set(car.position[0], 9.8, car.position[2] - 0.5);
    spot.target.position.set(car.position[0], 0.3, car.position[2]);
    spot.castShadow = true; spot.shadow.mapSize.width = 1024; spot.shadow.mapSize.height = 1024;
    spot.shadow.camera.near = 0.5; spot.shadow.camera.far = 25; spot.shadow.bias = -0.001;
    scene.add(spot); scene.add(spot.target);
    const rim = new THREE.SpotLight(0x4488cc, 1.2, 12, 0.4, 0.6);
    rim.position.set(car.position[0], 3.5, car.position[2] - 5);
    rim.target.position.set(car.position[0], 0.8, car.position[2]);
    scene.add(rim); scene.add(rim.target);
    const fill = new THREE.PointLight(0xffe8c0, 0.5, 7);
    fill.position.set(car.position[0], 1.8, car.position[2] + 4); scene.add(fill);
    const bounce = new THREE.PointLight(0x334466, 0.3, 6);
    bounce.position.set(car.position[0], 0.1, car.position[2]); scene.add(bounce);
  });
  for (let x = -27; x <= 27; x += 9) {
    const w1 = new THREE.PointLight(0x1a2244, 0.4, 12); w1.position.set(x, 6, -14.5); scene.add(w1);
    const w2 = new THREE.PointLight(0x1a2244, 0.3, 10); w2.position.set(x, 6, 14.5); scene.add(w2);
  }
  [[-28,0],[28,0]].forEach(([x,z]) => { const f = new THREE.PointLight(0x220a00, 0.8, 35); f.position.set(x, 2, z); scene.add(f); });
}
setupLighting();

// ===================== MUSEUM ARCHITECTURE =====================
function buildMuseum() {
  const floorMat = new THREE.MeshStandardMaterial({ color:0x080810, roughness:0.05, metalness:0.8 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(70, 35), floorMat);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
  const tileMat = new THREE.MeshStandardMaterial({ color:0x0d0d1a, roughness:0.2, metalness:0.3 });
  for (let ix=-3;ix<=3;ix++) for (let iz=-5;iz<=5;iz++) { const t=new THREE.Mesh(new THREE.PlaneGeometry(4.95,2.95),tileMat); t.rotation.x=-Math.PI/2; t.position.set(ix*5,0.001,iz*3); scene.add(t); }
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(70,35), new THREE.MeshStandardMaterial({color:0x060610,roughness:1}));
  ceil.rotation.x = Math.PI/2; ceil.position.y = 10; scene.add(ceil);
  CARS.forEach(car => {
    const coffer = new THREE.Mesh(new THREE.PlaneGeometry(4.5,4.5), new THREE.MeshStandardMaterial({color:0x0a0a18,roughness:0.8}));
    coffer.rotation.x=Math.PI/2; coffer.position.set(car.position[0],9.95,car.position[2]); scene.add(coffer);
    const frame = new THREE.Mesh(new THREE.RingGeometry(2.0,2.3,4), new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.1,metalness:1}));
    frame.rotation.x=Math.PI/2; frame.position.set(car.position[0],9.9,car.position[2]); scene.add(frame);
  });
  const wallMat = new THREE.MeshStandardMaterial({color:0x0a0a14,roughness:0.95});
  [{geo:[70,10],pos:[0,5,-17.5],rot:[0,0,0]},{geo:[70,10],pos:[0,5,17.5],rot:[0,Math.PI,0]},{geo:[35,10],pos:[-35,5,0],rot:[0,Math.PI/2,0]},{geo:[35,10],pos:[35,5,0],rot:[0,-Math.PI/2,0]}].forEach(w=>{
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(...w.geo),wallMat); mesh.position.set(...w.pos); mesh.rotation.set(...w.rot); scene.add(mesh);
  });
  const moldMat = new THREE.MeshStandardMaterial({color:0x060608,roughness:0.8,metalness:0.2});
  for (let x=-32;x<=32;x+=4) [17.3,-17.3].forEach(z=>{const m=new THREE.Mesh(new THREE.BoxGeometry(4,0.5,0.1),moldMat);m.position.set(x,0.25,z);scene.add(m);});
  const cornMat = new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.05,metalness:1});
  [-34.9,34.9].forEach(x=>{const c=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.35,35),cornMat);c.position.set(x,9.3,0);scene.add(c);});
  [-17.4,17.4].forEach(z=>{const c=new THREE.Mesh(new THREE.BoxGeometry(70,0.35,0.06),cornMat);c.position.set(0,9.3,z);scene.add(c);});
  const edgeMat = new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.05,metalness:1});
  CARS.forEach(car=>{
    const ped=new THREE.Mesh(new THREE.BoxGeometry(3.4,0.18,2.2),new THREE.MeshStandardMaterial({color:0x0c0c18,roughness:0.1,metalness:0.9}));
    ped.position.set(car.position[0],0.09,car.position[2]); ped.receiveShadow=true; scene.add(ped);
    const edge=new THREE.Mesh(new THREE.BoxGeometry(3.42,0.025,2.22),edgeMat); edge.position.set(car.position[0],0.185,car.position[2]); scene.add(edge);
    const plate=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.065,0.45),edgeMat); plate.position.set(car.position[0],0.19,car.position[2]+1.2); scene.add(plate);
  });
  [-21,-7,7,21].forEach(x=>{
    const colMat=new THREE.MeshStandardMaterial({color:0x0d0d1c,roughness:0.6,metalness:0.3});
    const capMat=new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.1,metalness:0.9});
    [-10,10].forEach(z=>{
      const col=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.28,10,16),colMat); col.position.set(x,5,z); col.castShadow=true; scene.add(col);
      const cap=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.15,0.8),capMat); cap.position.set(x,10.07,z); scene.add(cap);
      const base=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.08,0.7),capMat); base.position.set(x,0.04,z); scene.add(base);
    });
  });
  CARS.forEach(car=>{
    const housMat=new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.1,metalness:1});
    const h=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.4,0.25,12),housMat); h.position.set(car.position[0],9.87,car.position[2]); scene.add(h);
    const inner=new THREE.Mesh(new THREE.CircleGeometry(0.2,12),new THREE.MeshStandardMaterial({color:0xfff8e0,emissive:0xfff8e0,emissiveIntensity:1.5}));
    inner.rotation.x=Math.PI/2; inner.position.set(car.position[0],9.74,car.position[2]); scene.add(inner);
  });
  for (let x=-28;x<=28;x+=7) [-16.5,16.5].forEach(z=>{
    const sM=new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.1,metalness:0.9});
    const s=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.6,0.12),sM); s.position.set(x,4.5,z); scene.add(s);
    const g=new THREE.Mesh(new THREE.PlaneGeometry(0.15,0.3),new THREE.MeshStandardMaterial({color:0xffe4a0,emissive:0xffe4a0,emissiveIntensity:0.8,transparent:true,opacity:0.9}));
    g.position.set(x,4.5,z+(z>0?-0.07:0.07)); g.rotation.y=z>0?0:Math.PI; scene.add(g);
  });
  const refl=new THREE.Mesh(new THREE.PlaneGeometry(70,35),new THREE.MeshStandardMaterial({color:0x0a0a14,roughness:0,metalness:1,transparent:true,opacity:0.25}));
  refl.rotation.x=-Math.PI/2; refl.position.y=0.002; scene.add(refl);
}
buildMuseum();

// ===================== MATERIALS =====================
function mats(d) {
  return {
    body:new THREE.MeshStandardMaterial({color:d.color,roughness:0.15,metalness:0.85}),
    bodyMatte:new THREE.MeshStandardMaterial({color:d.color,roughness:0.4,metalness:0.6}),
    chrome:new THREE.MeshStandardMaterial({color:d.chromeColor,roughness:0.03,metalness:1}),
    chromeWarm:new THREE.MeshStandardMaterial({color:0xf0d080,roughness:0.05,metalness:1}),
    black:new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:0.8,metalness:0}),
    rubber:new THREE.MeshStandardMaterial({color:0x111111,roughness:0.95,metalness:0}),
    glass:new THREE.MeshStandardMaterial({color:0x88ccff,roughness:0,metalness:0,transparent:true,opacity:0.22}),
    accent:new THREE.MeshStandardMaterial({color:d.accentColor,roughness:0.05,metalness:1}),
    leather:new THREE.MeshStandardMaterial({color:0x2a1a0a,roughness:0.8,metalness:0}),
    headlight:new THREE.MeshStandardMaterial({color:0xffffff,roughness:0,emissive:0xffffcc,emissiveIntensity:0.8}),
    taillight:new THREE.MeshStandardMaterial({color:0xff2200,roughness:0.1,emissive:0xff2200,emissiveIntensity:0.6,transparent:true,opacity:0.85}),
    rim:new THREE.MeshStandardMaterial({color:0xbbbbbb,roughness:0.05,metalness:1}),
    darkChrome:new THREE.MeshStandardMaterial({color:0x444444,roughness:0.1,metalness:0.9}),
    brass:new THREE.MeshStandardMaterial({color:0xd4a843,roughness:0.05,metalness:1})
  };
}

// ===================== WHEEL BUILDER =====================
function buildWheel(m,g,x,y,z,radius,width,spokeType) {
  const tire=new THREE.Mesh(new THREE.TorusGeometry(radius,radius*0.28,10,28),m.rubber);
  tire.rotation.y=Math.PI/2; tire.position.set(x,y,z); g.add(tire);
  if (spokeType==='wire') {
    for (let s=0;s<16;s++){const sp=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,radius*1.8,4),m.chrome);sp.rotation.z=s*Math.PI/16;sp.position.set(x,y,z);g.add(sp);}
    const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,width*1.05,12),m.accent);hub.rotation.z=Math.PI/2;hub.position.set(x,y,z);g.add(hub);
    const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.03,12),m.chrome);cap.rotation.z=Math.PI/2;cap.position.set(x+width*0.53,y,z);g.add(cap);
  } else if (spokeType==='eared') {
    const rb=new THREE.Mesh(new THREE.CylinderGeometry(radius*0.82,radius*0.82,width*0.9,16),m.rim);rb.rotation.z=Math.PI/2;rb.position.set(x,y,z);g.add(rb);

document.addEventListener('keydown', e => { keys[e.code]=true; });
document.addEventListener('keyup',   e => { keys[e.code]=false; });
canvas.addEventListener('click', () => { if(!isLocked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => { isLocked = document.pointerLockElement===canvas; });
document.addEventListener('mousemove', e => {
  if(!isLocked) return;
  yaw   -= e.movementX*0.0018;
  pitch -= e.movementY*0.0018;
  pitch = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, pitch));
});
document.addEventListener('click', () => {
  if(!isLocked) return;
  const rc = new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2(0,0), camera);
  const all = []; carMeshes.forEach(cm => cm.group.traverse(m => { if(m.isMesh) all.push(m); }));
  const hits = rc.intersectObjects(all);
  if(hits.length>0) {
    const h=hits[0].object;
    for(const cm of carMeshes) { let f=false; cm.group.traverse(m=>{if(m===h)f=true;}); if(f){showCarInfo(cm.data);break;} }
  }
});
document.addEventListener('keydown', e => { if(e.code==='Escape') document.getElementById('info-panel').classList.remove('visible'); });

function showCarInfo(car) {
  document.getElementById('info-year').textContent = car.year;
  document.getElementById('info-name').textContent = car.name;
  document.getElementById('info-brand').textContent = car.brand;
  document.getElementById('info-desc').textContent = car.desc;
  const sp = document.getElementById('info-specs'); sp.innerHTML='';
  car.specs.forEach(s => { sp.innerHTML+=`<div class="spec-item"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`; });
  const nav=document.getElementById('car-nav'); nav.innerHTML='';
  CARS.forEach(c => { const dot=document.createElement('div'); dot.className='nav-dot'+(c.id===car.id?' active':''); dot.onclick=()=>showCarInfo(c); nav.appendChild(dot); });
  document.getElementById('info-panel').classList.add('visible');
}

// ===================== [2] WEBXR VR BUTTON =====================
// Implementación inline del VRButton, sin dependencias externas.
// Comprueba isSessionSupported, gestiona sesión y cambia etiqueta.
function initVRButton() {
  const btn = document.getElementById('VRButton');
  let currentSession = null;

  function onSessionStarted(session) {
    session.addEventListener('end', onSessionEnded);
    renderer.xr.setSession(session);
    btn.textContent = 'Salir de VR';
    currentSession = session;
  }
  function onSessionEnded() {
    currentSession && currentSession.removeEventListener('end', onSessionEnded);
    btn.textContent = 'Entrar en VR';
    currentSession = null;
  }

  btn.onclick = () => {
    if (currentSession) { currentSession.end(); return; }
    navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor','bounded-floor','hand-tracking','layers']
    }).then(onSessionStarted).catch(err => console.warn('WebXR session failed:', err));
  };

  if ('xr' in navigator) {
    navigator.xr.isSessionSupported('immersive-vr')
      .then(supported => {
        btn.textContent   = supported ? 'Entrar en VR' : 'VR no disponible';
        btn.disabled      = !supported;
        btn.style.display = 'block';
      })
      .catch(() => { btn.textContent='VR no disponible'; btn.disabled=true; btn.style.display='block'; });
  } else {
    btn.textContent='WebXR no soportado'; btn.disabled=true; btn.style.display='block';
  }
}

// ===================== ANIMATION LOOP =====================
const clock = new THREE.Clock();

function animate() {
  // ── NO requestAnimationFrame aquí ── setAnimationLoop lo llama
  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();

  carMeshes.forEach((cm,i) => { cm.group.rotation.y = Math.sin(t*0.1+i*1.3)*0.18; });

  const pos = pGeo.attributes.position.array;
  for (let i=0; i<particleCount; i++) {
    pos[i*3+1] += pSpeeds[i]*0.0003;
    if (pos[i*3+1]>10) pos[i*3+1]=0;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Movimiento desktop (desactivado mientras XR está presentando)
  if (isLocked && !renderer.xr.isPresenting) {
    euler.set(pitch,yaw,0); camera.quaternion.setFromEuler(euler);
    const speed = keys['ShiftLeft'] ? 9 : 5;
    const dir = new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])    dir.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  dir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  dir.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) dir.x+=1;
    if(dir.length()>0) { dir.normalize().applyEuler(new THREE.Euler(0,yaw,0)); camera.position.addScaledVector(dir,speed*dt); }
    camera.position.y=1.65;
    camera.position.x=Math.max(-32,Math.min(32,camera.position.x));
    camera.position.z=Math.max(-15,Math.min(14,camera.position.z));
    let nearest=Infinity,nearCar=null;
    carMeshes.forEach(cm=>{ const d=camera.position.distanceTo(new THREE.Vector3(...cm.data.position)); if(d<nearest){nearest=d;nearCar=cm;} });
    const lbl=document.getElementById('proximity-label');
    if(nearest<5.5){lbl.textContent=`${nearCar.data.brand} ${nearCar.data.name} · ${nearCar.data.year}`;lbl.classList.add('show');}
    else lbl.classList.remove('show');
  }

  renderer.render(scene, camera);
}

// ===================== LOADER =====================
window.addEventListener('load', () => {
  const bar=document.getElementById('loader-bar'), hint=document.getElementById('loader-hint'), btn=document.getElementById('enter-btn');
  setTimeout(()=>{bar.style.width='100%';},100);
  setTimeout(()=>{hint.textContent='Construyendo exposición...';},700);
  setTimeout(()=>{hint.textContent='Puliendo carrocerías...';},1400);
  setTimeout(()=>{hint.textContent='Museo listo';btn.style.display='block';},2500);
});

function enterMuseum() {
  document.getElementById('loader').classList.add('hidden');

  // ── [3] setAnimationLoop en lugar de requestAnimationFrame ──
  // Obligatorio para WebXR: Three.js reemplaza el loop con el
  // proporcionado por la XRSession cuando el modo VR está activo.
  renderer.setAnimationLoop(animate);

  // Inicializar el botón VR una vez el museo está en marcha
  initVRButton();

  setTimeout(()=>canvas.requestPointerLock(), 600);
}

window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
